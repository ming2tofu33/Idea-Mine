<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body {
    width: 1024px;
    height: 1024px;
    background: #101218;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(196,176,122,0.20) 0%, rgba(196,176,122,0) 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
  }
  .diamond {
    font-size: 480px;
    line-height: 1;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="diamond">💎</div>
</body>
</html>
